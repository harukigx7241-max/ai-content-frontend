# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# このファイルは HTTPS (Let's Encrypt) を前提とした設定例です。
# HTTP のみで動かす場合は下の「HTTP のみ版」セクションを使用してください。
# ドメインを設定する前に example.com を実際のドメインに置き換えてください:
#   sed -i 's/example.com/your-domain.com/g' deployment/nginx.conf
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

server {
    listen 80;
    server_name example.com www.example.com;
    # HTTPS にリダイレクト (SSL 終端後は下の server ブロックのみ残す)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name example.com www.example.com;

    # ── SSL 証明書 (Let's Encrypt など) ──────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── セキュリティヘッダー ─────────────────────────────────────────
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options        SAMEORIGIN;
    add_header X-XSS-Protection       "1; mode=block";

    # ── 静的ファイル (nginx で直接配信) ─────────────────────────────
    location /static/ {
        alias /root/prompt-guild/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── アプリ本体 (uvicorn へプロキシ) ──────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket が必要になった場合は以下を有効化
        # proxy_set_header Upgrade    $http_upgrade;
        # proxy_set_header Connection "upgrade";

        # タイムアウト
        proxy_connect_timeout 60s;
        proxy_read_timeout    120s;
        proxy_send_timeout    60s;
    }
}

