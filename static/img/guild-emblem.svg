<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="プロンプトギルド">
  <defs>
    <!-- 外リング グラデーション (真鍮) -->
    <linearGradient id="brassRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#d4a843"/>
      <stop offset="40%"  stop-color="#c27318"/>
      <stop offset="70%"  stop-color="#a85f10"/>
      <stop offset="100%" stop-color="#d4a843"/>
    </linearGradient>
    <!-- 盾 グラデーション -->
    <linearGradient id="shieldFill" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#fffdf8"/>
      <stop offset="100%" stop-color="#f0e8d8"/>
    </linearGradient>
    <!-- ハンマー グラデーション -->
    <linearGradient id="hammerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#78350f"/>
      <stop offset="100%" stop-color="#451a03"/>
    </linearGradient>
    <!-- 羽根ペン グラデーション -->
    <linearGradient id="quillGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#c27318"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <!-- 外リング shadow -->
    <filter id="emblemShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#78350f" flood-opacity="0.35"/>
    </filter>
    <!-- 内光 -->
    <filter id="innerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- 外縁 円形バッジ -->
  <circle cx="100" cy="100" r="96" fill="url(#brassRing)" filter="url(#emblemShadow)"/>
  <!-- 外縁 内リング -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#fef3c7" stroke-width="1.2" stroke-dasharray="4 3" opacity="0.6"/>
  <!-- 外縁 内塗り -->
  <circle cx="100" cy="100" r="85" fill="#2c1206"/>
  <!-- 中央パーチメント -->
  <circle cx="100" cy="100" r="75" fill="url(#shieldFill)"/>
  <!-- 内リング -->
  <circle cx="100" cy="100" r="75" fill="none" stroke="url(#brassRing)" stroke-width="2.5"/>
  <!-- 装飾内リング -->
  <circle cx="100" cy="100" r="68" fill="none" stroke="rgba(194,115,24,0.30)" stroke-width="0.8"/>

  <!-- 装飾コーナー 4点 -->
  <circle cx="100" cy="27" r="4"   fill="url(#brassRing)"/>
  <circle cx="173" cy="100" r="4"  fill="url(#brassRing)"/>
  <circle cx="100" cy="173" r="4"  fill="url(#brassRing)"/>
  <circle cx="27"  cy="100" r="4"  fill="url(#brassRing)"/>

  <!-- ── 工房ハンマー (中央やや左・斜め) ── -->
  <!-- ハンマー柄 -->
  <g transform="translate(100,100) rotate(-38)">
    <rect x="-3" y="-42" width="6" height="52"
          rx="3" fill="url(#hammerGrad)"/>
    <!-- 柄のグリップ -->
    <rect x="-4" y="2" width="8" height="8"
          rx="2" fill="#92400e" opacity="0.7"/>
    <!-- ハンマー頭部 -->
    <rect x="-14" y="-52" width="28" height="14"
          rx="4" fill="url(#hammerGrad)"/>
    <!-- ハンマー面 ハイライト -->
    <rect x="-12" y="-51" width="24" height="4"
          rx="2" fill="rgba(255,255,255,0.18)"/>
  </g>

  <!-- ── 羽根ペン (中央やや右・逆斜め) ── -->
  <g transform="translate(100,100) rotate(38)">
    <!-- 羽根本体 -->
    <ellipse cx="0" cy="-30" rx="9" ry="30"
             fill="url(#quillGrad)" opacity="0.9"/>
    <!-- 羽根の筋 -->
    <line x1="0" y1="-58" x2="0" y2="-4"
          stroke="#fffdf8" stroke-width="1" opacity="0.5"/>
    <!-- 羽根 右側 フェザー -->
    <path d="M0,-55 Q14,-45 8,-30 Q6,-35 0,-40 Z"
          fill="#d4a843" opacity="0.6"/>
    <path d="M0,-48 Q16,-38 9,-25 Q6,-30 0,-34 Z"
          fill="#c27318" opacity="0.5"/>
    <!-- ペン先 -->
    <path d="M-2,-4 L0,8 L2,-4 Z"
          fill="#451a03"/>
  </g>

  <!-- 中央交差部の星型飾り -->
  <circle cx="100" cy="100" r="7" fill="#c27318"/>
  <circle cx="100" cy="100" r="5" fill="#fef3c7"/>
  <circle cx="100" cy="100" r="2.5" fill="#c27318"/>

  <!-- 上部 装飾テキスト PROMPT -->
  <path id="topArc" d="M 48,80 A 55,55 0 0,1 152,80" fill="none"/>
  <text font-size="10" font-family="Georgia, 'Times New Roman', serif"
        font-weight="700" fill="#78350f" letter-spacing="3.5">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">PROMPT</textPath>
  </text>

  <!-- 下部 装飾テキスト GUILD -->
  <path id="botArc" d="M 50,120 A 55,55 0 0,0 150,120" fill="none"/>
  <text font-size="10" font-family="Georgia, 'Times New Roman', serif"
        font-weight="700" fill="#78350f" letter-spacing="5">
    <textPath href="#botArc" startOffset="50%" text-anchor="middle">GUILD</textPath>
  </text>

  <!-- 左右 短線飾り -->
  <line x1="40" y1="100" x2="57" y2="100" stroke="url(#brassRing)" stroke-width="1.5"/>
  <line x1="143" y1="100" x2="160" y2="100" stroke="url(#brassRing)" stroke-width="1.5"/>
  <!-- 短線の端ダイヤ -->
  <polygon points="40,100 43,103 46,100 43,97" fill="url(#brassRing)"/>
  <polygon points="160,100 157,103 154,100 157,97" fill="url(#brassRing)"/>
</svg>
