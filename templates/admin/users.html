<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ユーザー管理 — プロンプトギルド</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<header class="site-header">
  <div class="header-inner">
    <a href="/" class="logo" style="text-decoration:none">
      <span class="logo-icon">✦</span>
      <span class="logo-text">プロンプトギルド</span>
    </a>
    <div class="auth-nav">
      <span class="auth-user-name" style="color:var(--accent-gold)">管理者: {{ user.display_name }}</span>
      <a href="/mypage" class="auth-nav-btn outline">マイページ</a>
      <button class="auth-nav-btn outline" id="logoutBtn">ログアウト</button>
    </div>
  </div>
</header>

<main class="admin-container">
  <h1 class="admin-title">ユーザー管理</h1>
  <p style="color:var(--text-secondary);font-size:0.85rem;margin-bottom:24px">
    承認待ちユーザーの承認・却下・停止を管理します。
    <!-- TODO: Phase 3+ 統計・詳細管理・一括操作 -->
  </p>

  <!-- フィルター -->
  <div class="admin-filter-bar">
    <button class="admin-filter-btn active" data-status="">すべて</button>
    <button class="admin-filter-btn" data-status="pending">承認待ち</button>
    <button class="admin-filter-btn" data-status="approved">承認済み</button>
    <button class="admin-filter-btn" data-status="rejected">却下</button>
    <button class="admin-filter-btn" data-status="suspended">停止中</button>
  </div>

  <p id="loadingMsg" style="color:var(--text-muted);padding:16px 0">読み込み中...</p>
  <p id="emptyMsg" style="display:none;color:var(--text-muted);padding:16px 0;text-align:center">該当するユーザーが見つかりません</p>

  <div class="admin-table-wrap" id="tableWrap" style="display:none">
    <table class="admin-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>表示名</th>
          <th>SNS</th>
          <th>アカウント名</th>
          <th>ステータス</th>
          <th>登録日</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="userTableBody"></tbody>
    </table>
  </div>
</main>

<script>
const STATUS_LABELS = { pending:'承認待ち', approved:'承認済み', rejected:'却下', suspended:'停止中' };
let currentStatus = '';

async function loadUsers(status = '') {
  const url = '/api/admin/users' + (status ? `?status=${encodeURIComponent(status)}` : '');
  document.getElementById('loadingMsg').style.display = 'block';
  document.getElementById('tableWrap').style.display = 'none';
  document.getElementById('emptyMsg').style.display = 'none';

  try {
    const res = await fetch(url);
    if (res.status === 401 || res.status === 403) { location.href = '/login'; return; }
    const users = await res.json();
    renderUsers(users);
  } catch {
    document.getElementById('loadingMsg').textContent = '読み込みに失敗しました';
  }
}

function renderUsers(users) {
  document.getElementById('loadingMsg').style.display = 'none';
  if (!users.length) { document.getElementById('emptyMsg').style.display = 'block'; return; }

  document.getElementById('userTableBody').innerHTML = users.map(u => `
    <tr id="row-${u.id}">
      <td style="color:var(--text-muted)">${u.id}</td>
      <td>${esc(u.display_name)}</td>
      <td><span style="font-size:0.8rem;color:var(--text-secondary)">${esc(u.sns_platform)}</span></td>
      <td>${esc(u.sns_handle)}</td>
      <td><span class="status-badge ${u.status}">${STATUS_LABELS[u.status] || u.status}</span></td>
      <td style="font-size:0.8rem;color:var(--text-secondary)">${new Date(u.created_at).toLocaleDateString('ja-JP')}</td>
      <td>${actionBtns(u)}</td>
    </tr>
  `).join('');
  document.getElementById('tableWrap').style.display = 'block';
}

function actionBtns(u) {
  const b = [];
  if (['pending','rejected'].includes(u.status))
    b.push(`<button class="admin-action-btn approve" onclick="doAction(${u.id},'approve')">承認</button>`);
  if (u.status === 'pending')
    b.push(`<button class="admin-action-btn reject"  onclick="doAction(${u.id},'reject')">却下</button>`);
  if (u.status === 'approved')
    b.push(`<button class="admin-action-btn suspend" onclick="doAction(${u.id},'suspend')">停止</button>`);
  if (u.status === 'suspended')
    b.push(`<button class="admin-action-btn restore" onclick="doAction(${u.id},'restore')">復元</button>`);
  return b.join('');
}

async function doAction(userId, action) {
  const row = document.getElementById(`row-${userId}`);
  row.querySelectorAll('.admin-action-btn').forEach(b => b.disabled = true);
  try {
    const res = await fetch(`/api/admin/users/${userId}/${action}`, { method: 'POST' });
    const data = await res.json();
    if (!res.ok) { alert(data.detail || '操作に失敗しました'); row.querySelectorAll('.admin-action-btn').forEach(b => b.disabled = false); return; }
    loadUsers(currentStatus);
  } catch {
    alert('サーバーエラーが発生しました');
    row.querySelectorAll('.admin-action-btn').forEach(b => b.disabled = false);
  }
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('logoutBtn').addEventListener('click', async () => {
  await fetch('/api/auth/logout', { method: 'POST' });
  location.href = '/';
});

document.querySelectorAll('.admin-filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.admin-filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentStatus = btn.dataset.status;
    loadUsers(currentStatus);
  });
});

loadUsers();
</script>
</body>
</html>
