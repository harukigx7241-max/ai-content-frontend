<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ギルド参加申請 — プロンプトギルド</title>
  <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<header class="site-header">
  <div class="header-inner">
    <a href="/" class="logo" style="text-decoration:none">
      <img src="/static/img/guild-emblem.svg" alt="" class="logo-emblem" width="44" height="44">
      <span class="logo-text">プロンプトギルド</span>
    </a>
  </div>
</header>

<main class="auth-main">
  <div class="auth-card" style="max-width:540px">
    <div id="successView" style="display:none;text-align:center;padding:20px 0">
      <div style="font-size:2.5rem;margin-bottom:16px">⚔</div>
      <h2 style="color:var(--text-primary);margin-bottom:12px">ギルド参加申請が完了しました！</h2>
      <p id="successMsg" style="color:var(--text-secondary);margin-bottom:28px;line-height:1.6"></p>
      <a href="/login" class="auth-submit-btn" style="display:inline-block;padding:12px 32px;text-decoration:none;width:auto">
        入館する（ログイン）
      </a>
    </div>

    <div id="formView">
      <div class="auth-guild-badge" style="text-align:center;margin-bottom:8px;font-size:1.6rem">⚔</div>
      <h1 class="auth-title">ギルド参加申請</h1>
      <p class="auth-desc">SNSアカウントでギルドへ参加できます</p>

      <!-- ギルド参加特典バッジ -->
      <div style="background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.25);border-radius:10px;padding:10px 14px;margin-bottom:16px;font-size:0.78rem;color:var(--text-secondary);line-height:1.7">
        <span style="color:#fbbf24;font-weight:600">⚔ ギルド会員特典</span> —
        保存無制限 / 広場への投稿 / レベル&称号 / 今後の特典解放
      </div>

      <div id="authError" class="auth-error" style="display:none"></div>

      <form id="registerForm" class="auth-form" novalidate>
        <div class="field-group">
          <label class="field-label" for="sns_platform">SNSプラットフォーム <span style="color:#f87171">*</span></label>
          <select id="sns_platform" name="sns_platform" class="field-select" required>
            <option value="">選択してください</option>
            <option value="X">X (旧 Twitter)</option>
            <option value="Threads">Threads</option>
            <option value="Instagram">Instagram</option>
            <option value="note">note</option>
            <option value="TikTok">TikTok</option>
            <option value="YouTube">YouTube</option>
            <option value="ブログ">ブログ</option>
            <option value="その他">その他</option>
          </select>
        </div>

        <div class="field-group">
          <label class="field-label" for="sns_handle">SNSアカウント名 <span style="color:#f87171">*</span></label>
          <input id="sns_handle" type="text" name="sns_handle" class="field-input"
                 placeholder="@username（@は省略可）" required autocomplete="username">
        </div>

        <div class="field-group">
          <label class="field-label" for="display_name">表示名（冒険者名） <span style="color:#f87171">*</span></label>
          <input id="display_name" type="text" name="display_name" class="field-input"
                 placeholder="広場・マイページに表示される名前" required maxlength="100">
        </div>

        <div class="field-group">
          <label class="field-label" for="password">パスワード <span style="color:#f87171">*</span></label>
          <input id="password" type="password" name="password" class="field-input"
                 placeholder="8文字以上" required minlength="8" autocomplete="new-password">
        </div>

        <div class="field-group">
          <label class="field-label" for="profile_url">プロフィールURL <span style="color:var(--text-muted);font-size:0.75rem">任意</span></label>
          <input id="profile_url" type="url" name="profile_url" class="field-input"
                 placeholder="https://x.com/username">
        </div>

        <!-- Phase 8: 招待コード入力 -->
        <div class="field-group">
          <label class="field-label" for="invite_code">招待コード <span style="color:var(--text-muted);font-size:0.75rem">任意</span></label>
          <input id="invite_code" type="text" name="invite_code" class="field-input"
                 placeholder="招待コードをお持ちの場合は入力" maxlength="20"
                 autocomplete="off" style="text-transform:uppercase;letter-spacing:0.08em">
          <p style="font-size:0.72rem;color:var(--text-muted);margin-top:4px">
            招待コードがあると、コードによっては申請後すぐにご利用いただける場合があります
          </p>
        </div>

        <!-- TODO: Phase 3+ メールアドレス入力欄を追加 -->

        <button type="submit" class="auth-submit-btn" id="registerBtn">⚔ ギルドに参加する</button>
      </form>

      <div class="auth-footer">
        <p>すでにギルド会員の方は <a href="/login">入館する</a></p>
      </div>
    </div>
  </div>
</main>

<script>
// URL パラメータから招待コードを自動入力 (?code=XXXX または ?invite=XXXX)
(function() {
  const p = new URLSearchParams(window.location.search);
  const code = p.get('code') || p.get('invite');
  if (code) document.getElementById('invite_code').value = code.toUpperCase();
})();

// 入力時に大文字変換
document.getElementById('invite_code').addEventListener('input', function() {
  const pos = this.selectionStart;
  this.value = this.value.toUpperCase();
  this.setSelectionRange(pos, pos);
});

document.getElementById('registerForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('registerBtn');
  const errEl = document.getElementById('authError');
  errEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = '申請中...';

  const fd = new FormData(e.target);
  const body = {};
  fd.forEach((v, k) => { if (v !== '') body[k] = v; }); // 空欄は除外

  try {
    const res = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();

    if (!res.ok) {
      let msg = data.detail || '登録に失敗しました';
      // Pydantic validation error の配列対応
      if (Array.isArray(msg)) msg = msg.map(e => e.msg || JSON.stringify(e)).join(' / ');
      errEl.textContent = msg;
      errEl.style.display = 'block';
      return;
    }

    // 成功: フォームを隠して完了メッセージ表示
    document.getElementById('formView').style.display = 'none';
    document.getElementById('successMsg').textContent = data.message;
    document.getElementById('successView').style.display = 'block';

    // 自動承認された場合は /login へリダイレクト
    if (data.auto_approved) {
      setTimeout(() => { location.href = '/login'; }, 2000);
    }
  } catch {
    errEl.textContent = 'サーバーエラーが発生しました。しばらく経ってから再試行してください';
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = '⚔ ギルドに参加する';
  }
});
</script>
</body>
</html>
