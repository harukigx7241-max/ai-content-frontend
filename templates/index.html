<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>AI Content Pro</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <main class="container">
    <h1>AI Content Pro</h1>
    <p class="lead">note用プロンプトを生成します。</p>

    <section class="card">
      <label for="theme">テーマ</label>
      <input id="theme" type="text" placeholder="例: AI副業の始め方">

      <label for="target">ターゲット</label>
      <input id="target" type="text" placeholder="例: 副業初心者">

      <label for="tone">文体・トーン</label>
      <input id="tone" type="text" placeholder="例: やさしく実践的">

      <button id="generateBtn">プロンプト生成</button>
    </section>

    <section class="card">
      <label for="result">生成結果</label>
      <textarea id="result" rows="18" readonly></textarea>
    </section>
  </main>

  <script src="/static/js/app.js"></script>
</body>
</html>
